<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ron B*Bot</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="styles.css?v=17.2">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e6f0f8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Librería de Visión IA -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
</head>
<body>
    <div id="ron-app" class="ron-container">
        <!-- Pantalla de Inicio -->
        <!-- Pantalla de Inicio -->
        <div id="boot-screen" class="boot-screen">
            <button id="power-btn">ENCENDER A RON (v17.2 - REAL MUSIC)</button>
        </div>

        <!-- Botones de Control -->
        <button id="mic-toggle-btn" class="mic-toggle-btn">🎙️</button>
        <button id="ble-connect-btn" class="ble-btn">📡</button>




        <!-- Capa de Visión Oculta -->
        <video id="webcam" autoplay playsinline muted style="display: none;"></video>
        
        <!-- Configuración de API -->
        <div id="api-modal" class="api-modal hidden">
            <div class="modal-content">
                <h2>Configuración de Cerebro</h2>
                <p>Introduce tu API Key de Groq:</p>
                <input type="password" id="groq-key-input" placeholder="gsk_...">
                <button id="save-api-key">Guardar y Activar</button>
            </div>
        </div>

        <!-- Capa de Efectos de Fondo (Glitch) -->
        <div id="glitch-overlay" class="glitch-overlay"></div>

        <!-- Reproductor Invisible (v17.1 - Estilo Chronobeats) -->
        <div id="music-container" style="position: absolute; left: -999px; top: -999px; width: 200px; height: 200px; overflow: hidden; opacity: 0.01; pointer-events: none;">
            <div id="ron-yt-player"></div>
        </div>

        <!-- Cara de Ron -->
        <div class="face-container">
            <div class="eyes-layer">
                <div id="eye-left" class="eye"></div>
                <div id="eye-right" class="eye"></div>
            </div>
            <div class="mouth-layer">
                <svg class="mouth-svg" viewBox="0 0 100 60">
                    <path id="mouth-path" d="M 25 35 Q 50 50 75 35" />
                </svg>
            </div>
            <!-- Iconos del Pecho (v13.0) -->
            <div id="chest-icon-container" class="chest-icon-container"></div>
        </div>

        <!-- UI de Control (Invisible por defecto) -->
        <div id="debug-info" class="hidden"></div>
    </div>
    <script src="ron.js?v=17.2"></script>
</body>
</html>
